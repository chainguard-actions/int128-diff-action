name: Test diff with label
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create base and head files for diff
        run: |
          mkdir -p /tmp/diff-label-test/base
          mkdir -p /tmp/diff-label-test/head
          echo "original content" > /tmp/diff-label-test/base/config.txt
          echo "modified content" > /tmp/diff-label-test/head/config.txt

      - id: action
        uses: .
        with:
          base: /tmp/diff-label-test/base/config.txt
          head: /tmp/diff-label-test/head/config.txt
          label: needs-review
          token: ${{ github.token }}

      - name: Assert comment-body output is set
        env:
          ACTUAL: ${{ steps.action.outputs.comment-body }}
        run: |
          echo "actual: $ACTUAL"
          if [ -z "$ACTUAL" ]; then
            echo "FAIL: expected comment-body output to be non-empty"
            exit 1
          fi
          echo "PASS"
